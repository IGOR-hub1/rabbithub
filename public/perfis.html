<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Draksyon — Quem está assistindo?</title>
<script src="theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --bg:#0d0d0f;
  --bg-elev:#18181b;
  --text:#fff;
  --text-muted:#b3b3b3;
  --text-dim:#777;
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;overflow-x:hidden;
}

.topbar{
  position:absolute;top:0;left:0;right:0;
  padding:24px 32px;display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{
  width:38px;height:38px;border-radius:10px;overflow:hidden;
  background:var(--grad-brand-135);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-brand);
  border:1px solid rgba(255,255,255,.08);
}
.brand-dot img{display:block}
.brand-name{font-size:18px;font-weight:800;letter-spacing:.4px}

.logout-btn{
  background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);
  padding:8px 18px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;
  transition:.18s;
}
.logout-btn:hover{color:#fff;border-color:#fff}

.container{
  width:100%;max-width:1200px;text-align:center;
}
h1{
  font-size:clamp(32px,5vw,56px);font-weight:400;
  color:#fff;margin-bottom:48px;letter-spacing:-.5px;
}

.grid{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:20px;
}
@media(min-width:640px){.grid{gap:40px}}

.slot{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  cursor:pointer;user-select:none;
  animation:fadeIn .4s ease both;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.avatar{
  width:110px;height:110px;border-radius:10px;
  background:linear-gradient(135deg, var(--bg-elev), #202024);
  border:3px solid transparent;
  display:flex;align-items:center;justify-content:center;
  transition:.2s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
@media(min-width:640px){.avatar{width:160px;height:160px;border-radius:10px}}

.slot:hover .avatar{border-color:#fff;transform:scale(1.04)}
.slot:hover .slot-name{color:#fff}

.avatar .initial{
  font-size:64px;font-weight:800;color:#fff;
  background:var(--grad-brand-135);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
@media(min-width:640px){.avatar .initial{font-size:88px}}

.slot-name{
  font-size:16px;font-weight:500;color:var(--text-muted);
  transition:color .2s;letter-spacing:.2px;
}
@media(min-width:640px){.slot-name{font-size:18px}}

.avatar.add{
  background:transparent;border:2px dashed var(--border-strong);
}
.avatar.add svg{width:48px;height:48px;color:var(--text-muted);transition:color .2s}
.slot:hover .avatar.add{border-color:#fff;border-style:dashed}
.slot:hover .avatar.add svg{color:#fff}

.avatar.locked{opacity:.35;cursor:not-allowed;pointer-events:none}
.lock-tag{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);color:#fff;
  font-size:9px;font-weight:800;letter-spacing:.6px;
  padding:3px 8px;border-radius:4px;
}

/* Modo edição */
.edit-btn{
  margin-top:48px;background:transparent;border:1px solid var(--border-strong);
  color:var(--text-muted);padding:10px 26px;border-radius:2px;
  font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:.18s;
}
.edit-btn:hover{color:#fff;border-color:#fff}
.edit-btn.active{color:#fff;border-color:#fff;background:rgba(255,255,255,.06)}

.slot.editing .avatar{opacity:.6}
.slot.editing .avatar::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
}
.slot .del-badge{
  position:absolute;top:6px;right:6px;
  background:#111;border:1px solid var(--border-strong);color:#fff;
  width:28px;height:28px;border-radius:50%;
  display:none;align-items:center;justify-content:center;cursor:pointer;
  z-index:2;
}
.slot.editing .del-badge{display:flex}
.slot .del-badge:hover{background:#dc2626;border-color:#dc2626}
.slot .del-badge svg{width:14px;height:14px}

/* Modal criar perfil */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:oIn .2s ease both;
}
@keyframes oIn{from{opacity:0}to{opacity:1}}
.overlay.open{display:flex}
.modal{
  width:100%;max-width:420px;background:var(--bg-elev);
  border:1px solid var(--border);border-radius:12px;padding:28px;
  position:relative;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.8);
}
.modal h2{font-size:20px;font-weight:700;margin-bottom:18px}
.modal .close{
  position:absolute;top:14px;right:14px;background:transparent;border:none;color:#fff;
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.modal .close:hover{background:rgba(255,255,255,.08)}
.field{margin-bottom:16px}
.label{
  display:block;font-size:11px;color:var(--text-muted);
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;
}
.input{
  width:100%;background:#242428;border:1px solid var(--border-strong);
  color:#fff;font-size:14px;padding:12px 14px;border-radius:6px;outline:none;
  transition:.18s;
}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.btn{
  width:100%;padding:13px;border:none;border-radius:6px;cursor:pointer;
  font-size:14px;font-weight:700;color:#fff;background:var(--grad-brand-135);
  box-shadow:var(--shadow-brand);transition:.15s;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-brand-strong)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot"><img data-dk-logo src="img/logo-blue.jpg" alt="Draksyon" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" /></div>
    <div class="brand-name">DRAKSYON</div>
  </div>
  <button class="logout-btn" id="btn-logout">Sair</button>
</div>

<div class="container">
  <h1>Quem está assistindo?</h1>
  <div class="grid" id="grid"></div>
  <button class="edit-btn" id="btn-edit">Gerenciar perfis</button>
</div>

<!-- Modal criar/editar perfil -->
<div class="overlay" id="ov-create">
  <div class="modal">
    <button class="close" data-close="ov-create"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <h2 id="mod-title">Criar perfil</h2>
    <div class="field">
      <label class="label">Nome do perfil</label>
      <input class="input" id="prof-name" maxlength="24" placeholder="Ex: Kaito" />
    </div>
    <button class="btn" id="prof-save">Criar</button>
  </div>
</div>

<script>
(function(){
  var MAX_FREE = 2;
  var grid = document.getElementById('grid');
  var uid = null;
  var editMode = false;

  function key(){ return 'dk_profiles_' + (uid || 'anon'); }
  function load(){ try { return JSON.parse(localStorage.getItem(key()) || '[]'); } catch(e){ return []; } }
  function save(list){ try { localStorage.setItem(key(), JSON.stringify(list)); } catch(e){} }

  function slotEl(p, i){
    var slot = document.createElement('div'); slot.className = 'slot' + (editMode ? ' editing' : '');
    slot.style.position = 'relative';

    var del = document.createElement('button');
    del.className = 'del-badge';
    del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/></svg>';
    del.onclick = function(e){
      e.stopPropagation();
      if (!confirm('Excluir o perfil "' + p.name + '"?')) return;
      var list = load(); list.splice(i, 1); save(list);
      var ap = null; try { ap = JSON.parse(localStorage.getItem('dk_active_profile')||'null'); } catch(e){}
      if (ap && ap.id === p.id) localStorage.removeItem('dk_active_profile');
      render();
    };

    var av = document.createElement('div'); av.className = 'avatar';
    var initial = (p.name || '?').trim().charAt(0).toUpperCase();
    av.innerHTML = '<span class="initial">' + initial + '</span>';

    var name = document.createElement('div'); name.className = 'slot-name'; name.textContent = p.name;

    slot.onclick = function(){
      if (editMode) return;
      localStorage.setItem('dk_active_profile', JSON.stringify(p));
      location.href = 'index.html';
    };

    slot.appendChild(del);
    slot.appendChild(av);
    slot.appendChild(name);
    return slot;
  }

  function addEl(locked){
    var slot = document.createElement('div'); slot.className = 'slot';
    var av = document.createElement('div'); av.className = 'avatar add' + (locked ? ' locked' : '');
    av.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
    if (locked) av.innerHTML += '<span class="lock-tag">PLANO PRO</span>';
    var name = document.createElement('div'); name.className = 'slot-name'; name.textContent = locked ? 'Bloqueado' : 'Adicionar perfil';
    slot.appendChild(av); slot.appendChild(name);
    if (!locked) slot.onclick = function(){
      document.getElementById('mod-title').textContent = 'Criar perfil';
      document.getElementById('prof-name').value = '';
      document.getElementById('ov-create').classList.add('open');
      setTimeout(function(){ document.getElementById('prof-name').focus(); }, 50);
    };
    return slot;
  }

  function render(){
    var list = load();
    grid.innerHTML = '';
    list.forEach(function(p, i){ grid.appendChild(slotEl(p, i)); });
    if (list.length < MAX_FREE) grid.appendChild(addEl(false));
    if (list.length >= MAX_FREE) grid.appendChild(addEl(true));
  }

  document.getElementById('btn-edit').onclick = function(){
    editMode = !editMode;
    this.classList.toggle('active', editMode);
    this.textContent = editMode ? 'Concluído' : 'Gerenciar perfis';
    render();
  };

  document.getElementById('prof-save').onclick = function(){
    var n = (document.getElementById('prof-name').value || '').trim();
    if (!n) return;
    var list = load();
    if (list.length >= MAX_FREE) { alert('Você atingiu o limite de ' + MAX_FREE + ' perfis no plano gratuito.'); return; }
    list.push({ id: Date.now().toString(36), name: n });
    save(list);
    document.getElementById('prof-name').value = '';
    document.getElementById('ov-create').classList.remove('open');
    render();
  };

  document.querySelectorAll('[data-close]').forEach(function(b){
    b.onclick = function(){ document.getElementById(b.dataset.close).classList.remove('open'); };
  });
  document.querySelectorAll('.overlay').forEach(function(o){
    o.onclick = function(e){ if (e.target === o) o.classList.remove('open'); };
  });

  document.getElementById('btn-logout').onclick = function(){
    try { firebase.auth().signOut(); } catch(e){}
    localStorage.removeItem('dk_active_profile');
    location.replace('login.html');
  };

  function ready(){
    if (!window.firebase || !firebase.auth) { setTimeout(ready, 80); return; }
    if (!window.__DK_FB_INIT__) { try { firebase.initializeApp(window.DK_FIREBASE_CONFIG); window.__DK_FB_INIT__ = true; } catch(e){} }
    firebase.auth().onAuthStateChanged(function(u){
      if (!u) { location.replace('login.html'); return; }
      uid = u.uid;
      render();
    });
  }
  ready();
})();
</script>
</body>
</html>
