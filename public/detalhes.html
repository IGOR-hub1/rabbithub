    <title>Draksyon - Detalhes</title>
    <style>
/* ============ DRAKSYON DESIGN TOKENS (compartilhados) ============ */
:root{
  --bg:#0d0d0f;
  --bg-elev-1:#111113;
  --bg-elev-2:#18181b;
  --surface:rgba(255,255,255,0.03);
  --surface-hover:rgba(255,255,255,0.06);
  --surface-strong:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --text:#fff;
  --text-muted:#9aa0a6;
  --text-dim:#666;
  --text-faint:#555;
  --brand:#254BFF;
  --brand-2:#3A56F6;
  --brand-light:#5B7FFF;
  --brand-soft:rgba(37,75,255,0.12);
  --brand-soft-2:rgba(37,75,255,0.20);
  --brand-glow:rgba(37,75,255,0.35);
  --grad-brand:linear-gradient(90deg,#254BFF,#3A56F6);
  --grad-brand-135:linear-gradient(135deg,#254BFF,#3A56F6);
  --grad-brand-anim:linear-gradient(90deg,#254BFF,#3A56F6,#5B7FFF,#3A56F6,#254BFF);
  --shadow-sm:0 4px 12px rgba(0,0,0,0.35);
  --shadow-md:0 8px 24px rgba(0,0,0,0.45);
  --shadow-lg:0 20px 50px -12px rgba(0,0,0,0.8);
  --shadow-brand:0 8px 24px rgba(37,75,255,0.35);
  --shadow-brand-strong:0 12px 32px rgba(37,75,255,0.55);
  --r-sm:8px;
  --r-md:10px;
  --r-lg:12px;
  --r-xl:16px;
  --t-fast:.18s ease;
  --t-base:.25s cubic-bezier(.4,0,.2,1);
  --t-slow:.45s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow-y:auto;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.10);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:rgba(91,127,255,0.35)}
::-webkit-scrollbar-track{background:transparent}

/* Foco acessível */
:focus-visible{outline:2px solid var(--brand-light);outline-offset:2px;border-radius:6px}
button,a{-webkit-tap-highlight-color:transparent}

/* Animações utilitárias */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 6px 18px rgba(37,75,255,0.30)}50%{box-shadow:0 10px 28px rgba(37,75,255,0.55)}}
@keyframes gradientShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .45s ease both}
.fade-in{animation:fadeIn .35s ease both}
.pop-in{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}

/* ============ HEADER ============ */
.otk-header-fixed{
  position:fixed;top:0;left:0;right:0;height:65px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  background:rgba(13,13,15,0.78);
  backdrop-filter:blur(16px) saturate(1.1);-webkit-backdrop-filter:blur(16px) saturate(1.1);
  border-bottom:1px solid var(--border);
  z-index:100;
}
.header-inner{
  width:100%;max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.header-title{font-size:clamp(16px,2.5vw,22px);font-weight:700;color:#fff;letter-spacing:1px;text-align:center;flex:1}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{
  background:rgba(255,255,255,0.04);border:1px solid transparent;color:#fff;cursor:pointer;
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--t-fast),border-color var(--t-fast),transform var(--t-fast);
}
.icon-btn:hover{background:rgba(255,255,255,0.08);border-color:var(--border)}
.icon-btn:active{transform:scale(.92)}

.server-indicator{
  font-size:10px;color:var(--brand-light);font-weight:700;
  padding:4px 9px;border-radius:6px;
  background:rgba(37,75,255,0.10);border:1px solid rgba(37,75,255,0.25);
  white-space:nowrap;letter-spacing:.5px;
}

/* ============ DRAWER ============ */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:150;
  opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.drawer-overlay.open{opacity:1;visibility:visible}
.drawer{
  position:fixed;top:0;left:0;bottom:0;width:280px;max-width:82vw;
  background:var(--bg-elev-1);z-index:200;
  transform:translateX(-100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  overflow-y:auto;
  box-shadow:8px 0 32px rgba(0,0,0,0.5);
}
.drawer.open{transform:translateX(0)}
.drawer-top{
  padding:20px 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.drawer-brand-row{display:flex;align-items:center;gap:10px}
.drawer-brand-logo{
  width:38px;height:38px;border-radius:10px;
  background:var(--grad-brand-135);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(37,75,255,0.35);overflow:hidden;
}
.drawer-brand-logo img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.drawer-brand-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px}
.drawer-close-btn{
  background:rgba(255,255,255,0.04);border:none;color:#aaa;
  width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--t-fast);
}
.drawer-close-btn:hover{color:#fff;background:rgba(255,255,255,0.10)}
.drawer-close-btn:active{transform:scale(.9)}
.drawer-nav{list-style:none;padding:10px 8px 0}
.drawer-nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 12px;border-radius:10px;cursor:pointer;
  color:#9aa0a6;font-size:14px;font-weight:500;
  transition:background var(--t-fast),color var(--t-fast),transform var(--t-fast);
  border:none;background:none;width:100%;text-align:left;text-decoration:none;
  position:relative;
}
.drawer-nav-item::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:0;border-radius:2px;background:var(--brand);
  transition:height var(--t-base);
}
.drawer-nav-item:hover{background:rgba(255,255,255,0.04);color:#e5e5e5}
.drawer-nav-item:active{transform:scale(.98)}
.drawer-nav-item.active{background:var(--brand-soft);color:#fff}
.drawer-nav-item.active::before{height:60%}
.drawer-nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.65;transition:opacity var(--t-fast)}
.drawer-nav-item:hover svg{opacity:.95}
.drawer-nav-item.active svg{opacity:1;color:var(--brand-light)}
li + li .drawer-nav-item{margin-top:2px}
.drawer-divider{height:1px;background:var(--border);margin:8px 16px}
.drawer-section-label{padding:12px 16px 6px;font-size:11px;font-weight:700;color:var(--text-faint);letter-spacing:1.2px;text-transform:uppercase}
/* Drawer submenu (Filmes) */
.drawer-group-toggle{position:relative}
.drawer-group-caret{width:14px!important;height:14px!important;margin-left:auto;opacity:.6;transition:transform var(--t-base),opacity var(--t-fast)}
.drawer-group.open .drawer-group-caret{transform:rotate(180deg);opacity:1}
.drawer-submenu{list-style:none;margin:4px 8px 6px;padding:6px 4px;max-height:0;overflow:hidden;border-radius:10px;background:rgba(255,255,255,0.025);border:1px solid transparent;opacity:0;transform:translateY(-4px);transition:max-height .35s ease,opacity .25s ease,transform .25s ease,border-color .25s ease,padding .25s ease}
.drawer-group.open .drawer-submenu{max-height:240px;opacity:1;transform:translateY(0);border-color:var(--border);padding:8px 6px}
.drawer-subnav-item{display:flex;align-items:center;gap:12px;width:100%;padding:9px 14px 9px 18px;background:transparent;border:none;color:var(--text-muted);font-size:13.5px;font-weight:500;text-align:left;cursor:pointer;border-radius:8px;transition:background var(--t-fast),color var(--t-fast),transform var(--t-fast);text-decoration:none}
.drawer-subnav-item:hover{background:rgba(255,255,255,0.05);color:#e5e5e5}
.drawer-subnav-item:active{transform:scale(.98)}
.drawer-subnav-item.active{background:var(--brand-soft);color:#fff}
.drawer-bullet{width:6px;height:6px;border-radius:50%;background:var(--text-faint);flex-shrink:0;transition:background var(--t-fast),box-shadow var(--t-fast)}
.drawer-subnav-item:hover .drawer-bullet{background:#bbb}
.drawer-subnav-item.active .drawer-bullet{background:var(--brand-light);box-shadow:0 0 8px var(--brand-glow)}
li + li .drawer-subnav-item{margin-top:2px}
a.drawer-nav-item,a.drawer-subnav-item{text-decoration:none}
.server-option{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;cursor:pointer;
  color:#9aa0a6;font-size:13px;font-weight:500;
  transition:all var(--t-fast);border:none;background:none;width:100%;text-align:left;
}
.server-option:hover{background:rgba(255,255,255,0.04);color:#ddd}
.server-option:active{transform:scale(.98)}
.server-option.active{background:var(--brand-soft);color:#fff}
.server-radio{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color var(--t-fast)}
.server-option.active .server-radio{border-color:var(--brand)}
.server-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);display:none}
.server-option.active .server-radio-dot{display:block;animation:pop .25s ease}
.server-name{flex:1}
.server-badge{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(37,75,255,0.18);color:var(--brand-light);font-weight:700;letter-spacing:.5px}
.drawer-footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.drawer-avatar{width:38px;height:38px;border-radius:50%;background:#1a1a1e;background-size:cover;background-position:center;flex-shrink:0;border:2px solid var(--border-strong)}
.drawer-user-info{display:flex;flex-direction:column;gap:1px;flex:1}
.drawer-user-name{font-size:14px;font-weight:600;color:#ddd}
.drawer-user-role{font-size:11px;color:var(--text-faint)}


/* ============ DETALHES ============ */
body{padding-top:65px}

/* Hero area */
.hero-area{
  position:relative;overflow:hidden;
  padding:32px 20px 0;
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(36px) saturate(1.3);opacity:.25;transform:scale(1.35)}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,15,0.25) 0%,rgba(13,13,15,0.7) 55%,rgba(13,13,15,1) 100%)}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;max-width:600px;width:100%;animation:fadeUp .55s ease}
.hero-poster{
  width:170px;height:245px;border-radius:16px;object-fit:cover;
  border:2px solid rgba(255,255,255,0.08);
  box-shadow:var(--shadow-lg),0 0 0 1px rgba(255,255,255,0.04);
  transition:transform var(--t-base);
}
.hero-poster:hover{transform:translateY(-4px) scale(1.02)}
.anime-title{
  font-size:clamp(18px,5vw,28px);font-weight:700;color:#fff;line-height:1.35;
  margin-top:20px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  text-shadow:0 2px 18px rgba(0,0,0,0.5);
}

/* Assistir button */
.btn-assistir-main{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;max-width:420px;margin-top:20px;padding:15px 22px;
  background:var(--grad-brand-anim);background-size:200% 100%;
  color:#fff;border:none;border-radius:14px;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:var(--shadow-brand);
  transition:box-shadow var(--t-base),transform var(--t-fast);
  text-decoration:none;
  animation:gradientShift 5s linear infinite alternate;
}
.btn-assistir-main:hover{box-shadow:var(--shadow-brand-strong);transform:translateY(-2px)}
.btn-assistir-main:active{transform:scale(.97)}
.btn-assistir-main svg{width:20px;height:20px}

/* Stats row no hero */
.anime-stats{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  margin-top:14px;
}
.anime-stat-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:99px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border-strong);
  font-size:11px;color:#ddd;font-weight:700;letter-spacing:.4px;
  backdrop-filter:blur(8px);
}
.anime-stat-chip svg{width:12px;height:12px;color:var(--brand-light)}
.anime-stat-chip.gold svg{color:#fbbf24}
.anime-stat-chip.live{background:rgba(34,197,94,0.10);border-color:rgba(34,197,94,0.3);color:#86efac}
.anime-stat-chip.live svg{color:#22c55e}

.anime-subtitle{margin-top:14px;font-size:13px;color:var(--text-muted);line-height:1.55;padding-bottom:24px}

.main-content{max-width:1100px;margin:0 auto;padding:0 16px 30px}

.section-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.section-icon{width:24px;height:24px;color:#E85D5D;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(232,93,93,0.4))}
.section-icon.blue{color:var(--brand-light);filter:drop-shadow(0 0 6px var(--brand-glow))}
.section-title{font-size:18px;color:#fff;font-weight:700;letter-spacing:.3px}

.descricao-section{margin-bottom:26px;animation:fadeUp .5s ease both}
.descricao-text{
  font-size:14px;color:var(--text-muted);line-height:1.75;
  max-height:200px;overflow-y:auto;padding-right:6px;
  background:var(--surface);border:1px solid var(--border);
  padding:14px 16px;border-radius:12px;
}

.genre-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;animation:fadeUp .5s ease both}
.genre-chip{
  padding:9px 16px;border-radius:99px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  font-size:13px;color:#ddd;font-weight:500;
  transition:all var(--t-fast);cursor:default;
}
.genre-chip:hover{border-color:var(--brand-soft-2);color:#fff;background:var(--brand-soft);transform:translateY(-1px)}
.genre-chip.hidden{display:none}
.genre-toggle{
  padding:9px 16px;border-radius:99px;
  background:var(--brand-soft);border:1px solid rgba(37,75,255,0.3);
  font-size:13px;color:var(--brand-light);font-weight:700;
  cursor:pointer;transition:all var(--t-fast);
}
.genre-toggle:hover{background:rgba(37,75,255,0.20);border-color:rgba(37,75,255,0.5);transform:translateY(-1px)}
.genre-toggle:active{transform:scale(.96)}

.ep-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ep-search-box{position:relative;flex:1}
.ep-search{
  width:100%;padding:12px 14px 12px 42px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border-strong);
  border-radius:12px;color:#fff;font-size:14px;outline:none;
  transition:border-color var(--t-fast),box-shadow var(--t-fast),background var(--t-fast);
}
.ep-search:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(37,75,255,0.12);background:rgba(255,255,255,0.07)}
.ep-search::placeholder{color:#555}
.ep-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#666;pointer-events:none}
.ep-ordenar{
  width:46px;height:46px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.05);border:1px solid var(--border-strong);border-radius:12px;
  color:var(--text-muted);cursor:pointer;transition:all var(--t-fast);flex-shrink:0;
}
.ep-ordenar:hover{border-color:var(--brand);color:#fff;background:var(--brand-soft);transform:rotate(180deg)}
.ep-ordenar svg{width:18px;height:18px;transition:transform var(--t-base)}

.ep-list{display:flex;flex-direction:column;gap:10px;padding-bottom:24px}
.ep-card{
  display:flex;align-items:center;gap:14px;
  text-decoration:none;color:#fff;
  background:var(--surface);border-radius:14px;padding:14px;
  border:1px solid var(--border);
  transition:border-color var(--t-base),background var(--t-base),transform var(--t-base),box-shadow var(--t-base);
  cursor:pointer;animation:fadeUp .35s ease both;
}
.ep-card:hover{border-color:var(--brand-soft-2);background:rgba(255,255,255,0.06);transform:translateX(4px);box-shadow:var(--shadow-sm)}
.ep-card-info{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.ep-card-title{font-size:15px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.ep-card-status{font-size:12px;color:var(--text-dim);letter-spacing:.3px}
.ep-card-play{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:var(--grad-brand-135);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px var(--brand-glow);
  transition:box-shadow var(--t-base),transform var(--t-base);
}
.ep-card:hover .ep-card-play{box-shadow:var(--shadow-brand-strong);transform:scale(1.08)}
.ep-card-play svg{width:18px;height:18px;color:#fff;margin-left:2px}

.btn-fav{
  display:inline-flex;gap:7px;align-items:center;justify-content:center;
  cursor:pointer;font-weight:600;font-size:12px;
  background:rgba(255,255,255,0.04);color:#fff;
  border:1px solid var(--border-strong);
  border-radius:99px;padding:9px 16px;
  transition:all var(--t-fast);margin-top:12px;
}
.btn-fav:hover{background:rgba(255,255,255,0.08);transform:translateY(-1px)}
.btn-fav:active{transform:scale(.96)}
.btn-fav.active{background:var(--brand-soft);border-color:rgba(37,75,255,0.45);color:#fff}
.btn-fav svg{width:14px;height:14px}

.loading-screen{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-muted);font-size:15px;gap:12px}
.loading-screen::before{content:'';width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--brand);animation:spin .8s linear infinite}
.content-wrapper{display:none}

@media(max-width:340px){.hero-poster{width:140px;height:200px}}
@media(min-width:600px){.hero-poster{width:200px;height:285px};.main-content{padding:0 24px 40px}}
@media(min-width:768px){
  .otk-header-fixed{padding:0 28px}
  .hero-poster{width:210px;height:300px}
  .main-content{padding:0 28px 40px}
  .ep-list{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
}
@media(min-width:1024px){
  .hero-poster{width:230px;height:330px}
  .main-content{padding:0 40px 50px}
}
@media(min-width:1280px){.ep-list{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.main-content{padding:0 14px 30px}}

    <script>
/* =============================================================
 * DRAKSYON • AnimeFire Scraper (client-side, com cache & proxy)
 * Substitui o backend Node por scraping direto via CORS proxy.
 * Exposto em window.AF
 * ============================================================= */
(function(){
    var ORIGIN = 'https://animefire.io';
    // Lista de proxies CORS (rotaciona em caso de falha / bloqueio Cloudflare)
    var PROXIES = [
        // === DRAKSYON LOCAL PROXY (servidor Node próprio, roda no Termux) ===
        // Mesma origem do site -> sem CORS, sem CORP, sem Cloudflare bloqueando
        function(u){ return '/proxy?url=' + encodeURIComponent(u); },
        // Fallbacks públicos (caso o servidor local não esteja rodando)
        function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
        function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
        function(u){ return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u); }
    ];
    // Reescreve URLs de mídia (mp4 / m3u8 / iframes de player) para passarem pelo /stream
    // Isto resolve "Cross-Origin-Resource-Policy" e ERR_BLOCKED_BY_RESPONSE no <video>/<iframe>
    window.__DRAKSYON_STREAM__ = function(u){
        if(!u) return u;
        if(u.indexOf('/stream?') === 0 || u.indexOf('/proxy?') === 0) return u;
        return '/stream?url=' + encodeURIComponent(u);
    };
    // Detecta resposta de bloqueio Cloudflare
    function isBlocked(html){
        if(!html) return true;
        var s = html.slice(0, 4000).toLowerCase();
        return s.indexOf('sorry, you have been blocked') !== -1
            || s.indexOf('attention required! | cloudflare') !== -1
            || s.indexOf('checking your browser before') !== -1
            || s.indexOf('cf-error-details') !== -1
            || s.indexOf('please enable cookies') !== -1 && s.indexOf('cloudflare') !== -1;
    }
    var CACHE_PREFIX = 'af_cache_v2_';
    var CACHE_TTL_MS = 1000 * 60 * 30; // 30 min

    function cacheGet(k){
        try{
            var raw = localStorage.getItem(CACHE_PREFIX+k);
            if(!raw) return null;
            var o = JSON.parse(raw);
            if(!o || !o.ts || (Date.now()-o.ts) > CACHE_TTL_MS) return null;
            return o.v;
        }catch(e){ return null; }
    }
    function cacheSet(k,v){
        try{ localStorage.setItem(CACHE_PREFIX+k, JSON.stringify({ts:Date.now(), v:v})); }catch(e){}
    }

    /* fetch via proxy com tentativa em cadeia + timeout */
    async function fetchHtml(url, opts){
        opts = opts || {};
        var last;
        var expectJson = /\.(json)(\?|$)|\/video\//i.test(url);
        for(var i=0;i<PROXIES.length;i++){
            try{
                var ctl = ('AbortController' in window) ? new AbortController() : null;
                var to  = ctl ? setTimeout(function(){ try{ctl.abort();}catch(e){} }, 12000) : null;
                var res = await fetch(PROXIES[i](url), {
                    method: opts.method || 'GET',
                    headers: opts.headers || {},
                    body: opts.body || undefined,
                    signal: ctl ? ctl.signal : undefined
                });
                if(to) clearTimeout(to);
                if(!res.ok) throw new Error('HTTP '+res.status);
                var txt = await res.text();
                if(!txt) throw new Error('Resposta vazia');
                var trimmed = txt.trim();
                var looksJson = trimmed.charAt(0) === '{' || trimmed.charAt(0) === '[';
                if(!looksJson){
                    if(txt.length < 200) throw new Error('Resposta muito curta');
                    if(isBlocked(txt)) throw new Error('Bloqueado por Cloudflare');
                }
                return txt;
            }catch(e){ last = e; }
        }
        throw last || new Error('Todos os proxies falharam');
    }

    /* helpers */
    function abs(u){ if(!u) return ''; if(u.indexOf('//')===0) return 'https:'+u; if(u.indexOf('http')===0) return u; if(u[0]==='/') return ORIGIN+u; return ORIGIN+'/'+u; }
    function decodeEntities(s){ if(!s) return ''; var d=document.createElement('textarea'); d.innerHTML=s; return d.value; }
    function clean(s){ return decodeEntities((s||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim()); }

    function slugFromUrl(u){
        if(!u) return '';
        var m = u.match(/\/animes\/([^\/?#]+)/);
        if(!m) return '';
        return m[1].replace(/-todos-os-episodios$/,'').replace(/\/+$/,'');
    }

    /* Parse cards de listagens (lancamentos / dublados / legendados / genero / pesquisa) */
    function parseAnimeCards(html){
        var out = [];
        var seen = {};
        // Pattern para articles com link /animes/<slug>
        var re = /<article[^>]*class="[^"]*card[^"]*"[^>]*>([\s\S]*?)<\/article>/gi;
        var m;
        while((m = re.exec(html))){
            var block = m[1];
            var ah = block.match(/<a[^>]+href="([^"]+\/animes\/[^"]+)"/i);
            if(!ah) continue;
            var href = ah[1];
            var slug = slugFromUrl(href);
            if(!slug || seen[slug]) continue;
            var img = block.match(/<img[^>]+(?:data-src|src)="([^"]+)"/i);
            var capa = img ? abs(img[1]) : '';
            // pular placeholders inline
            if(/data:image/.test(capa)) {
                var img2 = block.match(/data-src="([^"]+)"/i);
                if(img2) capa = abs(img2[1]);
            }
            var tit = block.match(/<h3[^>]*>([^<]+)<\/h3>/i) ||
                      block.match(/alt="([^"]+)"/i);
            var titulo = clean(tit ? tit[1] : slug);
            // remover sufixos comuns "- Episódio X"
            titulo = titulo.replace(/\s*-\s*Epis[oó]dio\s*\d+.*$/i,'').trim();
            seen[slug] = true;
            out.push({ slug: slug, titulo: titulo, capa: capa });
        }
        // fallback: divCard*
        if(out.length === 0){
            var re2 = /<a[^>]+href="([^"]+\/animes\/[^"]+)"[^>]*>[\s\S]*?<img[^>]+(?:data-src|src)="([^"]+)"[^>]*alt="([^"]*)"/gi;
            while((m = re2.exec(html))){
                var slug2 = slugFromUrl(m[1]);
                if(!slug2 || seen[slug2]) continue;
                seen[slug2] = true;
                out.push({ slug: slug2, titulo: clean(m[3]).replace(/\s*-\s*Epis[oó]dio\s*\d+.*$/i,'').trim() || slug2, capa: abs(m[2]) });
            }
        }
        return out;
    }

    /* Listas paginadas */
    async function listing(path, page){
        page = page || 1;
        var url = ORIGIN + path + (page>1 ? '/'+page : '');
        var ck = 'list:'+path+':'+page;
        var cached = cacheGet(ck);
        if(cached) return cached;
        var html = await fetchHtml(url);
        var data = parseAnimeCards(html);
        cacheSet(ck, data);
        return data;
    }
    function lancamentos(p){ return listing('/em-lancamento', p); }
    function dublados(p){    return listing('/lista-de-animes-dublados', p); }
    function legendados(p){  return listing('/lista-de-animes-legendados', p); }
    function genero(slug,p){ return listing('/genero/'+slug, p); }

    function categorias(){
        return Promise.resolve([
            {nome:'Ação', slug:'acao'},{nome:'Aventura', slug:'aventura'},{nome:'Comédia', slug:'comedia'},
            {nome:'Drama', slug:'drama'},{nome:'Fantasia', slug:'fantasia'},{nome:'Romance', slug:'romance'},
            {nome:'Shounen', slug:'shounen'},{nome:'Seinen', slug:'seinen'},{nome:'Sobrenatural', slug:'sobrenatural'},
            {nome:'Mecha', slug:'mecha'},{nome:'Mistério', slug:'misterio'},{nome:'Esporte', slug:'esporte'},
            {nome:'Horror', slug:'horror'},{nome:'Magia', slug:'magia'},{nome:'Psicológico', slug:'psicologico'},
            {nome:'Suspense', slug:'suspense'},{nome:'Vida Escolar', slug:'vida-escolar'},{nome:'Superpoder', slug:'superpoder'},
            {nome:'Militar', slug:'militar'},{nome:'Demônios', slug:'demonios'},{nome:'Vampiros', slug:'vampiros'},
            {nome:'Ficção Científica', slug:'ficcao-cientifica'},{nome:'Harém', slug:'harem'},{nome:'Música', slug:'musical'}
        ]);
    }

    /* Detalhes do anime + lista de episódios */
    async function detalhes(slug){
        if(!slug) throw new Error('slug vazio');
        var ck = 'det:'+slug;
        var cached = cacheGet(ck);
        if(cached) return cached;
        var url = ORIGIN + '/animes/' + slug + '-todos-os-episodios';
        var html = await fetchHtml(url);

        var titulo = '';
        var t = html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
        if(t) titulo = clean(t[1]);
        if(!titulo){
            var og = html.match(/<meta[^>]+property="og:title"[^>]+content="([^"]+)"/i);
            if(og) titulo = clean(og[1]).replace(/\s*-\s*Todos os Epis[oó]dios.*$/i,'').replace(/\s*-\s*AnimeFire.*$/i,'').trim();
        }

        var capa = '';
        var ogi = html.match(/<meta[^>]+property="og:image"[^>]+content="([^"]+)"/i);
        if(ogi) capa = abs(ogi[1]);
        if(!capa){
            var im = html.match(/<img[^>]+class="[^"]*capa[^"]*"[^>]+(?:data-src|src)="([^"]+)"/i);
            if(im) capa = abs(im[1]);
        }

        var sinopse = '';
        var sn = html.match(/<div[^>]*class="[^"]*divSinopse[^"]*"[^>]*>([\s\S]*?)<\/div>/i) ||
                 html.match(/<meta[^>]+name="description"[^>]+content="([^"]+)"/i);
        if(sn) sinopse = clean(sn[1]);

        // Gêneros: links /genero/<slug>
        var generos = [];
        var gset = {};
        var gre = /<a[^>]+href="[^"]*\/genero\/([^"\/]+)"[^>]*>([^<]+)<\/a>/gi;
        var gm;
        while((gm = gre.exec(html))){
            var nm = clean(gm[2]);
            if(nm && !gset[nm]) { gset[nm]=1; generos.push(nm); }
        }

        // Episódios: links /animes/<slug>/<n>
        var episodios = [];
        var seen = {};
        var ere = new RegExp('<a[^>]+href="([^"]*\/animes\/' + slug.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&') + '\/(\\d+))"[^>]*>([\\s\\S]*?)<\/a>', 'gi');
        var em;
        while((em = ere.exec(html))){
            var num = parseInt(em[2],10);
            if(seen[num]) continue;
            seen[num] = true;
            var inner = em[3];
            var label = clean(inner) || ('Episódio ' + num);
            // tentar pegar só o número
            episodios.push({
                numero: num,
                nome: 'Episódio ' + num,
                link: abs(em[1])
            });
        }
        episodios.sort(function(a,b){ return a.numero - b.numero; });

        var data = {
            slug: slug,
            titulo: titulo || slug,
            capa: capa,
            sinopse: sinopse,
            generos: generos,
            episodios: episodios,
            score: ''
        };
        cacheSet(ck, data);
        return data;
    }

    /* Player: extrai data-video-src e busca o JSON com fontes (URL real, sem seleção de qualidade) */
    async function player(epLink){
        if(!epLink) throw new Error('link vazio');
        var url = epLink.indexOf('http')===0 ? epLink : abs(epLink);
        var html = await fetchHtml(url);

        // 1) Atributo data-video-src (endpoint JSON do AnimeFire: /video/{slug}/{ep}?...)
        var vs = html.match(/data-video-src=["']([^"']+)["']/i);
        if(vs){
            var jsonUrl = decodeEntities(vs[1]);
            if(jsonUrl.indexOf('http') !== 0){
                jsonUrl = jsonUrl.indexOf('//')===0 ? 'https:'+jsonUrl : (jsonUrl[0]==='/' ? ORIGIN+jsonUrl : ORIGIN+'/'+jsonUrl);
            }
            try{
                var jtxt = await fetchHtml(jsonUrl);
                var j = null;
                try{ j = JSON.parse(jtxt); }catch(e){
                    var mm = jtxt && jtxt.match(/\{[\s\S]*\}/);
                    if(mm){ try{ j = JSON.parse(mm[0]); }catch(e2){} }
                }
                if(j){
                    var arr = j.data || j.sources || j.qualities || [];
                    if(arr && arr.length){
                        var sources = arr.map(function(s){
                            var u = s.src || s.url || s.file || '';
                            return { url: u, label: (s.label || (s.height? s.height+'p' : 'Auto')), type: 'video/mp4' };
                        }).filter(function(s){ return !!s.url; });
                        if(sources.length) return { sources: sources, iframe: '' };
                    }
                    if(j.src) return { sources:[{url:j.src,label:'Auto',type:'video/mp4'}], iframe:'' };
                }
            }catch(e){ /* fallback abaixo */ }
            return { sources: [], iframe: jsonUrl };
        }

        // 2) Procurar por iframe direto
        var ifr = html.match(/<iframe[^>]+src=["']([^"']+)["']/i);
        if(ifr) return { sources: [], iframe: decodeEntities(ifr[1]) };

        // 3) Procurar .mp4 cru
        var mp4 = html.match(/https?:\/\/[^"' ]+\.mp4[^"' ]*/i);
        if(mp4) return { sources:[{ url: mp4[0], label:'HD', type:'video/mp4' }], iframe:'' };

        return { erro: 'Não foi possível extrair a fonte do vídeo.' };
    }

    /* Pesquisa: usa o endpoint POST /proc/search do AnimeFire */
    async function pesquisar(q, opts){
        q = (q||'').trim();
        if(!q) return [];
        var ck = 'srch:'+q.toLowerCase();
        var cached = cacheGet(ck);
        if(cached) return cached;

        var url = ORIGIN + '/proc/search';
        var body = 'search_string=' + encodeURIComponent(q);
        var html = '';
        try{
            html = await fetchHtml(url, {
                method:'POST',
                headers:{'Content-Type':'application/x-www-form-urlencoded'},
                body: body
            });
        }catch(e){
            // fallback: pesquisa via URL GET
            try{ html = await fetchHtml(ORIGIN + '/pesquisar/' + encodeURIComponent(q)); }
            catch(e2){ throw e; }
        }
        var data = parseAnimeCards(html);
        // filtra por título contendo termos
        var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
        if(terms.length){
            data = data.filter(function(a){
                var t = (a.titulo||'').toLowerCase();
                return terms.every(function(w){ return t.indexOf(w) !== -1; });
            });
        }
        cacheSet(ck, data);
        return data;
    }

    window.AF = {
        lancamentos: lancamentos,
        dublados: dublados,
        legendados: legendados,
        genero: genero,
        categorias: categorias,
        detalhes: detalhes,
        player: player,
        pesquisar: pesquisar
    };
})();

</script>
    <script>
    var animeSlug = new URLSearchParams(window.location.search).get('anime') || '';

    // Drawer
    var drawer = document.getElementById('drawer');
    var overlay = document.getElementById('drawer-overlay');
    document.getElementById('menu-btn').addEventListener('click', function(){ drawer.classList.add('open'); overlay.classList.add('open'); });
    document.getElementById('drawer-close').addEventListener('click', function(){ drawer.classList.remove('open'); overlay.classList.remove('open'); });
    overlay.addEventListener('click', function(){ drawer.classList.remove('open'); overlay.classList.remove('open'); });



    var allEpisodes = [];
    var ascending = false;
    var isFav = false;
    var LS_FAV = 'draksyon_favs_v1';
    var LS_HISTORY = 'draksyon_history_v1';
    var genresExpanded = false;
    var animeMeta = { titulo: '', capa: '' };

    function getFavs(){ try{return JSON.parse(localStorage.getItem(LS_FAV)||'[]');}catch(e){return [];} }
    function saveFavs(arr){ localStorage.setItem(LS_FAV, JSON.stringify(arr)); }
    function isFavSlug(slug){
        return getFavs().some(function(x){ return (typeof x === 'string') ? x === slug : (x && x.slug === slug); });
    }
    function setFav(slug, info, on){
        var favs = getFavs().filter(function(x){ return (typeof x === 'string') ? x !== slug : (x && x.slug !== slug); });
        if (on) favs.unshift({ slug: slug, titulo: info.titulo, capa: info.capa, ts: Date.now() });
        saveFavs(favs);
    }
    function pushHistory(item){
        try {
            var hist = JSON.parse(localStorage.getItem(LS_HISTORY)||'[]');
            hist = hist.filter(function(x){ return x.slug !== item.slug; });
            hist.unshift(item);
            if (hist.length > 50) hist = hist.slice(0,50);
            localStorage.setItem(LS_HISTORY, JSON.stringify(hist));
        } catch(e){}
    }

    async function carregar() {
        if (!animeSlug) { document.getElementById('loading').textContent = 'Nenhum anime selecionado.'; return; }
        try {
            var data = await AF.detalhes(animeSlug);

            document.getElementById('titulo').innerText = data.titulo || 'Sem título';
            var capaUrl = data.capa || '';
            document.getElementById('capa').src = capaUrl;
            document.getElementById('hero-bg').style.backgroundImage = 'url(' + capaUrl + ')';
            document.getElementById('sinopse').innerText = data.sinopse || 'Sinopse não disponível.';
            animeMeta = { titulo: data.titulo || '', capa: capaUrl };

            // Subtitle
            var subtitle = document.getElementById('anime-subtitle');
            subtitle.innerText = 'Assistir ' + (data.titulo || '') + ' Online';

            // First episode button
            var eps = data.episodios || [];
            allEpisodes = eps;
            if (eps.length > 0) {
                var firstEp = eps[0];
                var btnAssistir = document.getElementById('btn-assistir-primeiro');
                btnAssistir.href = 'player-animes.html?anime=' + encodeURIComponent(animeSlug) +
                    '&ep=' + encodeURIComponent(firstEp.link) +
                    '&nome=' + encodeURIComponent(firstEp.nome || 'Episódio 1') +
                    '&idx=0' +
                    '&capa=' + encodeURIComponent(capaUrl) +
                    '&titulo=' + encodeURIComponent(data.titulo || '');
                document.getElementById('btn-assistir-label').textContent = 'Assistir ' + (firstEp.nome || 'Episódio 1');
                btnAssistir.addEventListener('click', function(){
                    pushHistory({ slug: animeSlug, titulo: animeMeta.titulo, capa: animeMeta.capa, epNome: firstEp.nome, epIdx: 0, ts: Date.now(), progresso: 5 });
                });
            }

            // Stats hero (info adicional)
            var statsEl = document.getElementById('anime-stats');
            statsEl.innerHTML = '';
            var stats = [];
            stats.push({ icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>', txt: eps.length + ' episódio' + (eps.length===1?'':'s'), cls: '' });
            if (data.status) stats.push({ icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>', txt: data.status, cls: 'live' });
            else stats.push({ icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>', txt: 'EM EXIBIÇÃO', cls: 'live' });
            stats.push({ icon:'<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15 9 22 9 17 14 19 22 12 17 5 22 7 14 2 9 9 9 12 2"/></svg>', txt: (data.score || '9.0') + '/10', cls: 'gold' });
            stats.push({ icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>', txt: 'HD', cls: '' });
            stats.forEach(function(s){
                var c = document.createElement('span');
                c.className = 'anime-stat-chip ' + s.cls;
                c.innerHTML = s.icon + s.txt;
                statsEl.appendChild(c);
            });

            // Favoritos
            isFav = isFavSlug(animeSlug);
            updateFavUI();
            document.getElementById('fav-btn').addEventListener('click', function(){
                isFav = !isFav;
                setFav(animeSlug, animeMeta, isFav);
                updateFavUI();
            });

            // Gêneros
            var genreRow = document.getElementById('genre-row');
            genreRow.innerHTML = '';
            var allGenres = data.generos || [];
            allGenres.forEach(function(g, i) {
                var chip = document.createElement('span');
                chip.className = 'genre-chip' + (i >= 6 ? ' hidden' : '');
                chip.textContent = g;
                genreRow.appendChild(chip);
            });
            if (allGenres.length > 6) {
                var toggleBtn = document.createElement('button');
                toggleBtn.className = 'genre-toggle';
                toggleBtn.id = 'genre-toggle';
                toggleBtn.textContent = '+' + (allGenres.length - 6) + ' mais';
                toggleBtn.addEventListener('click', function() {
                    genresExpanded = !genresExpanded;
                    var chips = genreRow.querySelectorAll('.genre-chip');
                    chips.forEach(function(c, i) { if (i >= 6) c.classList.toggle('hidden', !genresExpanded); });
                    toggleBtn.textContent = genresExpanded ? 'Ver menos' : '+' + (allGenres.length - 6) + ' mais';
                });
                genreRow.appendChild(toggleBtn);
            }

            renderEpisodes(allEpisodes);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('conteudo').style.display = 'block';
        } catch (e) {
            console.error(e);
            document.getElementById('loading').innerHTML = 'Erro ao carregar.<br><span style="font-size:12px;color:#555;">Verifique sua conexão e tente novamente.</span>';
        }
    }

    function updateFavUI(){
        var btn = document.getElementById('fav-btn');
        if(isFav){
            btn.classList.add('active');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="#5B7FFF" stroke="#5B7FFF" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> FAVORITADO';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg> FAVORITAR';
        }
    }

    function renderEpisodes(eps) {
        var lista = document.getElementById('ep-list');
        lista.innerHTML = '';
        eps.forEach(function(ep, idx) {
            var card = document.createElement('a');
            card.className = 'ep-card';
            card.href = 'player-animes.html?anime=' + encodeURIComponent(animeSlug) +
                '&ep=' + encodeURIComponent(ep.link) +
                '&nome=' + encodeURIComponent(ep.nome || ('Episódio ' + (idx + 1))) +
                '&idx=' + idx +
                '&capa=' + encodeURIComponent(animeMeta.capa) +
                '&titulo=' + encodeURIComponent(animeMeta.titulo);
            var titulo = ep.nome || 'Episódio ' + (idx + 1);
            card.innerHTML =
                '<div class="ep-card-info">' +
                    '<div class="ep-card-title">' + titulo + '</div>' +
                    '<div class="ep-card-status">Pronto para assistir • HD</div>' +
                '</div>' +
                '<div class="ep-card-play"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>';
            card.addEventListener('click', function(){
                pushHistory({ slug: animeSlug, titulo: animeMeta.titulo, capa: animeMeta.capa, epNome: titulo, epIdx: idx, ts: Date.now(), progresso: 5 });
            });
            lista.appendChild(card);
        });
    }

    document.getElementById('btn-ordenar').addEventListener('click', function() {
        ascending = !ascending;
        var sorted = allEpisodes.slice();
        if (ascending) sorted.reverse();
        renderEpisodes(sorted);
    });

    document.getElementById('ep-search').addEventListener('input', function(e) {
        var q = (e.target.value || '').trim();
        if (!q) { renderEpisodes(allEpisodes); return; }
        var filtered = allEpisodes.filter(function(ep) {
            var num = (ep.nome || '').replace(/[^0-9]/g, '');
            return num.indexOf(q) !== -1;
        });
        renderEpisodes(filtered);
    });

    document.getElementById('ep-search').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            var q = (e.target.value || '').trim();
            var idx = allEpisodes.findIndex(function(ep) { return (ep.nome || '').replace(/[^0-9]/g, '') === q; });
            if (idx !== -1 && allEpisodes[idx].link) {
                window.location.href = 'player-animes.html?anime=' + encodeURIComponent(animeSlug) +
                    '&ep=' + encodeURIComponent(allEpisodes[idx].link) +
                    '&nome=' + encodeURIComponent(allEpisodes[idx].nome) +
                    '&idx=' + idx;
            }
        }
    });

    carregar();
    </script>
