<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Draksyon — Entrar</title>
<script src="theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --bg:#0d0d0f;
  --bg-elev-1:#111113;
  --bg-elev-2:#18181b;
  --surface:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --text:#fff;
  --text-muted:#9aa0a6;
  --text-dim:#666;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px;
  -webkit-font-smoothing:antialiased;
}

.card{
  width:100%;max-width:460px;
  background:var(--bg-elev-1);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 50px -12px rgba(0,0,0,0.8);
  margin-top:24px;
}

/* Header */
.card-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 20px;
  border-bottom:1px solid var(--border);
}
.head-logo{
  width:42px;height:42px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  border:1px solid var(--border-strong);
  background:var(--bg-elev-2);
}
.head-logo img{width:100%;height:100%;object-fit:cover;display:block}
.head-text{flex:1;min-width:0}
.head-title{font-size:16px;font-weight:800;letter-spacing:.3px;color:#fff}
.head-sub{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.head-close{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:1px solid var(--border-strong);
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:.18s;flex-shrink:0;
}
.head-close:hover{color:#fff;background:rgba(255,255,255,.05)}
.head-close svg{width:16px;height:16px}

/* Body */
.card-body{padding:22px 20px 24px}

.field{margin-bottom:16px}
.field-label{
  display:block;font-size:13px;font-weight:700;
  color:#fff;margin-bottom:8px;letter-spacing:.2px;
}
.name-row{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.name-row.show{display:grid}
.name-row .field{margin-bottom:0}

.input-wrap{position:relative}
.input{
  width:100%;background:var(--bg-elev-2);
  border:1px solid var(--border-strong);color:#fff;
  font-size:14.5px;padding:14px 14px;border-radius:10px;
  outline:none;transition:border-color .18s, box-shadow .18s;
}
.input::placeholder{color:var(--text-dim)}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}

.pw-input{padding-right:78px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;color:var(--brand-light);
  font-size:13.5px;font-weight:700;cursor:pointer;
  padding:6px 8px;border-radius:6px;
}
.pw-toggle:hover{background:var(--brand-soft)}

.btn{
  width:100%;padding:15px;border:none;border-radius:10px;cursor:pointer;
  font-size:15px;font-weight:800;letter-spacing:.3px;color:#fff;
  background:var(--grad-brand-135);box-shadow:var(--shadow-brand);
  transition:transform .12s, box-shadow .18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:4px;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-brand-strong)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.65;cursor:not-allowed}
.btn .spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;
}
.btn.loading .spin{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{
  text-align:center;font-size:12.5px;color:var(--text-muted);
  margin-top:14px;
}
.switch-line{
  text-align:center;font-size:13.5px;color:var(--text-muted);
  margin-top:18px;
}
.switch-line a{
  color:var(--brand-light);font-weight:800;cursor:pointer;
  margin-left:4px;text-decoration:none;
}
.switch-line a:hover{text-decoration:underline}

.forgot-line{
  text-align:right;margin-top:-8px;margin-bottom:16px;
}
.forgot-line a{
  font-size:12.5px;color:var(--brand-light);font-weight:700;
  cursor:pointer;text-decoration:none;
}
.forgot-line a:hover{text-decoration:underline}

.msg{
  font-size:12.5px;padding:11px 12px;border-radius:8px;
  margin-bottom:14px;display:none;line-height:1.4;
}
.msg.err{display:block;background:rgba(220,38,38,.10);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
.msg.ok{display:block;background:rgba(22,163,74,.10);border:1px solid rgba(22,163,74,.35);color:#86efac}
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <div class="head-logo"><img data-dk-logo src="img/logo-blue.jpg" alt="Draksyon" /></div>
    <div class="head-text">
      <div class="head-title" id="head-title">Acesse RabbitHub <span style="color:var(--brand-light)">•</span> ANIMES</div>
      <div class="head-sub" id="head-sub">Entrar ou criar conta</div>
    </div>
    <a href="index.html" class="head-close" aria-label="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
  </div>

  <div class="card-body">
    <div class="msg" id="msg"></div>

    <form id="form" autocomplete="on">
      <div class="name-row" id="name-row">
        <div class="field">
          <label class="field-label">Nome</label>
          <input type="text" class="input" id="firstname" autocomplete="given-name" placeholder="Seu nome" />
        </div>
        <div class="field">
          <label class="field-label">Sobrenome</label>
          <input type="text" class="input" id="lastname" autocomplete="family-name" placeholder="Seu sobrenome" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="input-wrap">
          <input type="email" class="input" id="email" required autocomplete="email" placeholder="seuemail@exemplo.com" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Senha</label>
        <div class="input-wrap">
          <input type="password" class="input pw-input" id="password" required minlength="6" autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="pw-toggle" id="pw-toggle">Mostrar</button>
        </div>
      </div>

      <div class="forgot-line"><a id="forgot">Esqueci a senha</a></div>

      <button class="btn" id="submit" type="submit">
        <span class="spin"></span>
        <span class="lbl">Entrar</span>
      </button>

      <p class="hint" id="hint">Use seu e-mail e senha para acessar sua conta.</p>
    </form>

    <p class="switch-line" id="switch-line">Não tem conta? <a data-mode="signup">Criar conta</a></p>
  </div>
</div>

<script>
(function(){
  var mode = 'login';
  var msg = document.getElementById('msg');
  var pw  = document.getElementById('password');
  var btn = document.getElementById('submit');
  var lbl = btn.querySelector('.lbl');
  var em  = document.getElementById('email');
  var nameRow = document.getElementById('name-row');
  var pwToggle = document.getElementById('pw-toggle');

  pwToggle.addEventListener('click', function(){
    var isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    pwToggle.textContent = isPw ? 'Ocultar' : 'Mostrar';
  });

  function setMode(m){
    mode = m;
    lbl.textContent = m === 'signup' ? 'Criar conta' : 'Entrar';
    pw.setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
    pw.setAttribute('placeholder', m === 'signup' ? 'Mínimo 6 caracteres' : '••••••••');
    nameRow.classList.toggle('show', m === 'signup');
    document.getElementById('hint').textContent = m === 'signup'
      ? 'Crie uma conta gratuita para salvar seu progresso.'
      : 'Use seu e-mail e senha para acessar sua conta.';
    document.getElementById('switch-line').innerHTML = m === 'signup'
      ? 'Já tem conta? <a data-mode="login">Entrar</a>'
      : 'Não tem conta? <a data-mode="signup">Criar conta</a>';
    msg.className = 'msg';
    bindModeLinks();
  }
  function bindModeLinks(){
    document.querySelectorAll('[data-mode]').forEach(function(el){
      el.onclick = function(){ setMode(el.dataset.mode); };
    });
  }
  bindModeLinks();

  function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }
  function friendly(code){
    var map = {
      'auth/invalid-email':'E-mail inválido.',
      'auth/user-not-found':'Nenhuma conta encontrada com este e-mail.',
      'auth/wrong-password':'Senha incorreta.',
      'auth/invalid-credential':'E-mail ou senha incorretos.',
      'auth/email-already-in-use':'Este e-mail já está cadastrado. Tente entrar.',
      'auth/weak-password':'Senha muito fraca (mínimo 6 caracteres).',
      'auth/network-request-failed':'Falha de rede. Verifique sua conexão.',
      'auth/too-many-requests':'Muitas tentativas. Aguarde alguns instantes.',
      'auth/operation-not-allowed':'E-mail/Senha não está habilitado no Firebase.',
      'auth/missing-password':'Digite sua senha.'
    };
    return map[code] || 'Erro ao autenticar. Tente novamente.';
  }

  function ensureInit(){
    if (!window.firebase || !firebase.auth) return false;
    if (!window.__DK_FB_INIT__) {
      try { firebase.initializeApp(window.DK_FIREBASE_CONFIG); window.__DK_FB_INIT__ = true; }
      catch(e){ window.__DK_FB_INIT__ = true; }
    }
    return true;
  }

  function checkExisting(){
    if (!ensureInit()) { setTimeout(checkExisting, 200); return; }
    firebase.auth().onAuthStateChanged(function(user){
      if (user) location.replace('perfis.html');
    });
  }
  checkExisting();

  document.getElementById('forgot').addEventListener('click', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase carregando… tente novamente em 1s.'); return; }
    var email = em.value.trim();
    if (!email) { show('err','Digite seu e-mail acima para receber o link de recuperação.'); em.focus(); return; }
    try {
      await firebase.auth().sendPasswordResetEmail(email);
      show('ok','Enviamos um link de recuperação para ' + email + '.');
    } catch(err){ show('err', friendly(err && err.code)); }
  });

  document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase não carregou. Recarregue a página.'); return; }
    var email = em.value.trim();
    var pass  = pw.value;
    btn.disabled = true; btn.classList.add('loading'); msg.className = 'msg';
    try {
      try { await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL); } catch(_){}

      if (mode === 'signup') {
        var cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
        var fn = (document.getElementById('firstname').value || '').trim();
        var ln = (document.getElementById('lastname').value || '').trim();
        var full = (fn + ' ' + ln).trim();
        if (full && cred && cred.user && cred.user.updateProfile) {
          try { await cred.user.updateProfile({ displayName: full }); } catch(_){}
        }
      } else {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
      }
      show('ok','Sucesso! Redirecionando…');
      setTimeout(function(){ location.replace('perfis.html'); }, 400);
    } catch(err){
      show('err', friendly(err && err.code));
      btn.disabled = false; btn.classList.remove('loading');
    }
  });
})();
</script>
</body>
</html>
