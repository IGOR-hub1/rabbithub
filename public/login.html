<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Draksyon — Entrar</title>
<script src="theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="dk-message.js"></script>
<style>
:root{
  --bg:#0d0d0f;
  --bg-elev-1:#111113;
  --bg-elev-2:#18181b;
  --surface:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.12);
  --text:#fff;
  --text-muted:#9aa0a6;
  --text-dim:#666;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px;
  -webkit-font-smoothing:antialiased;
}

.card{
  width:100%;max-width:460px;
  background:var(--bg-elev-1);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 50px -12px rgba(0,0,0,0.8);
  margin-top:24px;
}

/* Header */
.card-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 20px;
  border-bottom:1px solid var(--border);
}
.head-logo{
  width:42px;height:42px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  border:1px solid var(--border-strong);
  background:var(--bg-elev-2);
}
.head-logo img{width:100%;height:100%;object-fit:cover;display:block}
.head-text{flex:1;min-width:0}
.head-title{font-size:16px;font-weight:800;letter-spacing:.3px;color:#fff}
.head-sub{font-size:12.5px;color:var(--text-muted);margin-top:2px}
.head-close{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:1px solid var(--border-strong);
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:.18s;flex-shrink:0;
}
.head-close:hover{color:#fff;background:rgba(255,255,255,.05)}
.head-close svg{width:16px;height:16px}

/* Body */
.card-body{padding:22px 20px 24px}

.field{margin-bottom:16px}
.field-label{
  display:block;font-size:13px;font-weight:700;
  color:#fff;margin-bottom:8px;letter-spacing:.2px;
}
.name-row{display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.name-row.show{display:grid}
.name-row .field{margin-bottom:0}

.input-wrap{position:relative}
.input{
  width:100%;background:var(--bg-elev-2);
  border:1px solid var(--border-strong);color:#fff;
  font-size:14.5px;padding:14px 14px;border-radius:10px;
  outline:none;transition:border-color .18s, box-shadow .18s;
}
.input::placeholder{color:var(--text-dim)}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}

.pw-input{padding-right:78px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;color:var(--brand-light);
  font-size:13.5px;font-weight:700;cursor:pointer;
  padding:6px 8px;border-radius:6px;
}
.pw-toggle:hover{background:var(--brand-soft)}

.btn{
  width:100%;padding:15px;border:none;border-radius:10px;cursor:pointer;
  font-size:15px;font-weight:800;letter-spacing:.3px;color:#fff;
  background:var(--grad-brand-135);box-shadow:var(--shadow-brand);
  transition:transform .12s, box-shadow .18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:4px;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-brand-strong)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.65;cursor:not-allowed}
.btn .spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;
}
.btn.loading .spin{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{
  text-align:center;font-size:12.5px;color:var(--text-muted);
  margin-top:14px;
}
.switch-line{
  text-align:center;font-size:13.5px;color:var(--text-muted);
  margin-top:18px;
}
.switch-line a{
  color:var(--brand-light);font-weight:800;cursor:pointer;
  margin-left:4px;text-decoration:none;
}
.switch-line a:hover{text-decoration:underline}

.forgot-line{
  text-align:right;margin-top:-8px;margin-bottom:16px;
}
.forgot-line a{
  font-size:12.5px;color:var(--brand-light);font-weight:700;
  cursor:pointer;text-decoration:none;
}
.forgot-line a:hover{text-decoration:underline}

.msg{
  font-size:12.5px;padding:11px 12px;border-radius:8px;
  margin-bottom:14px;display:none;line-height:1.4;
}
.msg.err{display:block;background:rgba(220,38,38,.10);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
.msg.ok{display:block;background:rgba(22,163,74,.10);border:1px solid rgba(22,163,74,.35);color:#86efac}
</style>
</head>
<body>

<div class="card">
  <div class="card-head">
    <div class="head-logo"><img data-dk-logo src="img/logo-blue.jpg" alt="Draksyon" /></div>
    <div class="head-text">
      <div class="head-title" id="head-title">Acesse RabbitHub <span style="color:var(--brand-light)">•</span> ANIMES</div>
      <div class="head-sub" id="head-sub">Entrar ou criar conta</div>
    </div>
    <a href="index.html" class="head-close" aria-label="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
  </div>

  <div class="card-body">
    <div class="msg" id="msg"></div>

    <form id="form" autocomplete="on">
      <div class="name-row" id="name-row">
        <div class="field">
          <label class="field-label">Nome</label>
          <input type="text" class="input" id="firstname" autocomplete="given-name" placeholder="Seu nome" />
        </div>
        <div class="field">
          <label class="field-label">Sobrenome</label>
          <input type="text" class="input" id="lastname" autocomplete="family-name" placeholder="Seu sobrenome" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="input-wrap">
          <input type="email" class="input" id="email" required autocomplete="email" placeholder="seuemail@exemplo.com" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Senha</label>
        <div class="input-wrap">
          <input type="password" class="input pw-input" id="password" required minlength="6" autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="pw-toggle" id="pw-toggle">Mostrar</button>
        </div>
      </div>

      <div class="forgot-line"><a id="forgot">Esqueci a senha</a></div>

      <button class="btn" id="submit" type="submit">
        <span class="spin"></span>
        <span class="lbl">Entrar</span>
      </button>

      <p class="hint" id="hint">Use seu e-mail e senha para acessar sua conta.</p>
    </form>

    <p class="switch-line" id="switch-line">Não tem conta? <a data-mode="signup">Criar conta</a></p>
  </div>
</div>

<script>
(function(){
  var mode = 'login';
  var msg = document.getElementById('msg');
  var pw  = document.getElementById('password');
  var btn = document.getElementById('submit');
  var lbl = btn.querySelector('.lbl');
  var em  = document.getElementById('email');
  var nameRow = document.getElementById('name-row');
  var pwToggle = document.getElementById('pw-toggle');

  pwToggle.addEventListener('click', function(){
    var isPw = pw.type === 'password';
    pw.type = isPw ? 'text' : 'password';
    pwToggle.textContent = isPw ? 'Ocultar' : 'Mostrar';
  });

  function setMode(m){
    mode = m;
    lbl.textContent = m === 'signup' ? 'Criar conta' : 'Entrar';
    pw.setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
    pw.setAttribute('placeholder', m === 'signup' ? 'Mínimo 6 caracteres' : '••••••••');
    nameRow.classList.toggle('show', m === 'signup');
    document.getElementById('hint').textContent = m === 'signup'
      ? 'Crie uma conta gratuita para salvar seu progresso.'
      : 'Use seu e-mail e senha para acessar sua conta.';
    document.getElementById('switch-line').innerHTML = m === 'signup'
      ? 'Já tem conta? <a data-mode="login">Entrar</a>'
      : 'Não tem conta? <a data-mode="signup">Criar conta</a>';
    msg.className = 'msg';
    bindModeLinks();
  }
  function bindModeLinks(){
    document.querySelectorAll('[data-mode]').forEach(function(el){
      el.onclick = function(){ setMode(el.dataset.mode); };
    });
  }
  bindModeLinks();

  function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }

  function ensureInit(){
    if (!window.firebase || !firebase.database) return false;
    if (!window.__DK_FB_INIT__) {
      try { firebase.initializeApp(window.DK_FIREBASE_CONFIG); window.__DK_FB_INIT__ = true; }
      catch(e){ window.__DK_FB_INIT__ = true; }
    }
    return true;
  }

  function emailToUid(email){
    return String(email || '').trim().toLowerCase()
      .replace(/[^a-z0-9]/g, '_')
      .replace(/^_+|_+$/g, '')
      .slice(0, 100);
  }

  // SHA-256 puro em JS (fallback para HTTP/contexto não-seguro onde crypto.subtle é undefined)
  function sha256Fallback(str){
    function rr(n,x){return (x>>>n)|(x<<(32-n));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=unescape(encodeURIComponent(str)), l=b.length, w=[], i;
    for(i=0;i<l;i++) w[i>>2]|=b.charCodeAt(i)<<(24-(i%4)*8);
    w[l>>2]|=0x80<<(24-(l%4)*8); w[((l+8>>6)+1)*16-1]=l*8;
    for(i=0;i<w.length;i+=16){
      var a=H[0],bb=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7],t1,t2,s0,s1,ch,mj,j;
      for(j=0;j<64;j++){
        if(j<16){ w[i+j]=w[i+j]|0; }
        else{ var w15=w[i+j-15],w2=w[i+j-2]; s0=rr(7,w15)^rr(18,w15)^(w15>>>3); s1=rr(17,w2)^rr(19,w2)^(w2>>>10); w[i+j]=(w[i+j-16]+s0+w[i+j-7]+s1)|0; }
        s1=rr(6,e)^rr(11,e)^rr(25,e); ch=(e&f)^(~e&g); t1=(h+s1+ch+K[j]+w[i+j])|0;
        s0=rr(2,a)^rr(13,a)^rr(22,a); mj=(a&bb)^(a&c)^(bb&c); t2=(s0+mj)|0;
        h=g; g=f; f=e; e=(d+t1)|0; d=c; c=bb; bb=a; a=(t1+t2)|0;
      }
      H[0]=(H[0]+a)|0; H[1]=(H[1]+bb)|0; H[2]=(H[2]+c)|0; H[3]=(H[3]+d)|0;
      H[4]=(H[4]+e)|0; H[5]=(H[5]+f)|0; H[6]=(H[6]+g)|0; H[7]=(H[7]+h)|0;
    }
    return H.map(function(x){return ('00000000'+((x>>>0).toString(16))).slice(-8);}).join('');
  }

  async function sha256(text){
    try {
      if (window.crypto && window.crypto.subtle && window.crypto.subtle.digest){
        var enc = new TextEncoder().encode(String(text));
        var buf = await window.crypto.subtle.digest('SHA-256', enc);
        return Array.from(new Uint8Array(buf))
          .map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      }
    } catch(e){}
    return sha256Fallback(String(text));
  }


  (function checkExisting(){
    try {
      var s = JSON.parse(localStorage.getItem('dk_session') || 'null');
      if (s && s.uid) location.replace('perfis.html');
    } catch(e){}
  })();

  document.getElementById('forgot').addEventListener('click', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase carregando… tente novamente em 1s.'); return; }
    var email = em.value.trim();
    if (!email) { show('err','Digite seu e-mail acima para redefinir a senha.'); em.focus(); return; }
    var nova = prompt('Digite a NOVA senha (mínimo 6 caracteres) para ' + email + ':');
    if (!nova || nova.length < 6) { show('err','Senha muito curta.'); return; }
    try {
      var uid = emailToUid(email);
      var snap = await firebase.database().ref('users/' + uid).once('value');
      if (!snap.exists()) { show('err','Nenhuma conta encontrada com este e-mail.'); return; }
      var hash = await sha256(nova);
      await firebase.database().ref('users/' + uid).update({ passwordHash: hash });
      show('ok','Senha atualizada. Já pode entrar com a nova senha.');
    } catch(err){ show('err', 'Erro: ' + (err && err.message ? err.message : err)); }
  });

  document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase não carregou. Recarregue a página.'); return; }
    var email = em.value.trim();
    var pass  = pw.value;
    if (!email || !/.+@.+\..+/.test(email)) { show('err','E-mail inválido.'); return; }
    if (!pass || pass.length < 6) { show('err','Senha muito curta (mínimo 6).'); return; }

    btn.disabled = true; btn.classList.add('loading'); msg.className = 'msg';
    try {
      var uid  = emailToUid(email);
      var hash = await sha256(pass);
      var ref  = firebase.database().ref('users/' + uid);
      var snap = await ref.once('value');
      var data = snap.val();

      if (mode === 'signup') {
        if (data) throw new Error('Este e-mail já está cadastrado. Tente entrar.');
        var fn = (document.getElementById('firstname').value || '').trim();
        var ln = (document.getElementById('lastname').value || '').trim();
        var full = (fn + ' ' + ln).trim();
        await ref.set({
          uid: uid, email: email, displayName: full,
          passwordHash: hash, banned: false,
          createdAt: firebase.database.ServerValue.TIMESTAMP,
          lastLogin: firebase.database.ServerValue.TIMESTAMP
        });
        localStorage.setItem('dk_session', JSON.stringify({ uid: uid, email: email, displayName: full }));
      } else {
        if (!data) throw new Error('Nenhuma conta encontrada com este e-mail.');
        if (data.banned === true) throw new Error('Esta conta foi banida. Entre em contato com o suporte.');
        if (data.passwordHash !== hash) throw new Error('E-mail ou senha incorretos.');
        await ref.update({ lastLogin: firebase.database.ServerValue.TIMESTAMP });
        localStorage.setItem('dk_session', JSON.stringify({
          uid: uid, email: data.email || email, displayName: data.displayName || ''
        }));
      }

      show('ok','Sucesso! Redirecionando…');
      setTimeout(function(){ location.replace('perfis.html'); }, 400);

    } catch(err){
      show('err', (err && err.message) ? err.message : 'Erro ao autenticar. Tente novamente.');
      btn.disabled = false; btn.classList.remove('loading');
    }
  });
})();
</script>
</body>
</html>
