<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Draksyon — Entrar</title>
<script src="theme.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --bg:#0a0a0d;
  --card:#141418;
  --card-2:#1a1a20;
  --border:rgba(255,255,255,0.06);
  --border-strong:rgba(255,255,255,0.14);
  --text:#fff;
  --text-muted:#9aa0a6;
  --text-dim:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 20% 10%, var(--brand-soft-2), transparent 60%),
    radial-gradient(1000px 500px at 80% 90%, var(--brand-soft), transparent 60%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

/* ===== Card container ===== */
.card{
  width:100%;max-width:1100px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  overflow:hidden;
  display:grid;grid-template-columns:1fr;
  box-shadow:0 40px 100px -20px rgba(0,0,0,.65);
}
@media(min-width:900px){
  .card{grid-template-columns:1.05fr 1fr;min-height:620px}
}

/* ===== Hero (esquerda) ===== */
.hero{
  position:relative;overflow:hidden;
  padding:20px;
  min-height:280px;
  display:flex;flex-direction:column;
  border-radius:20px;
  margin:14px;
  background:#0a0a10;
  border:1px solid var(--border);
}
.hero-top{
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:4;gap:10px;
}
.hero-brand{display:flex;align-items:center;gap:12px;color:#fff;min-width:0}
.hero-logo{
  width:56px;height:56px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  border:2px solid rgba(255,255,255,.35);
  box-shadow:0 6px 20px var(--brand-glow), 0 0 0 4px var(--brand-soft-2);
  background:var(--grad-brand-135);
}
.hero-logo img{width:100%;height:100%;object-fit:cover;display:block}
.hero-name{font-size:20px;font-weight:800;letter-spacing:.6px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.hero-back{
  background:rgba(255,255,255,.15);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.22);color:#fff;
  padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;text-decoration:none;
  transition:.2s;flex-shrink:0;
}
.hero-back:hover{background:rgba(255,255,255,.25)}
.hero-back svg{width:14px;height:14px}

/* Carrossel de banners */
.hero-banner{
  position:absolute;inset:0;z-index:1;overflow:hidden;border-radius:20px;
}
.hero-banner-slide{
  position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.1s ease;
}
.hero-banner-slide.on{opacity:1}
.hero-banner::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,.55) 55%, rgba(10,10,15,.92) 100%),
    linear-gradient(90deg, rgba(10,10,15,.35) 0%, rgba(10,10,15,0) 60%);
}

.hero-copy{margin-top:auto;position:relative;z-index:3;color:#fff}
.hero-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:#fff;padding:5px 10px;border-radius:99px;
  background:var(--brand-soft-2);border:1px solid var(--brand);
  margin-bottom:10px;
}
.hero-title{
  font-size:clamp(22px,3.4vw,32px);font-weight:800;line-height:1.15;
  letter-spacing:-.3px;text-shadow:0 2px 12px rgba(0,0,0,.5);
}
.hero-dots{display:flex;gap:6px;margin-top:16px}
.hero-dots span{
  width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,.3);
  cursor:pointer;transition:.25s;
}
.hero-dots span.on{background:var(--brand-light);width:30px;box-shadow:0 0 8px var(--brand-glow)}

/* ===== Painel (direita) ===== */
.panel{
  padding:36px 28px;
  display:flex;flex-direction:column;justify-content:center;
}
@media(min-width:900px){.panel{padding:48px 56px}}

.panel-title{font-size:28px;font-weight:800;letter-spacing:-.3px}
.panel-sub{color:var(--text-muted);font-size:13.5px;margin-top:8px}
.panel-sub a{color:var(--brand-light);text-decoration:underline;font-weight:600;cursor:pointer}

.tabs{
  display:flex;background:var(--card-2);border-radius:12px;padding:4px;
  margin:22px 0;border:1px solid var(--border);
}
.tab{
  flex:1;text-align:center;padding:10px 8px;font-size:13px;font-weight:700;
  color:var(--text-muted);border-radius:9px;cursor:pointer;transition:.2s;
}
.tab.active{background:var(--grad-brand-135);color:#fff;box-shadow:var(--shadow-brand)}

.name-row{display:none;gap:10px;margin-bottom:12px}
.name-row.show{display:grid;grid-template-columns:1fr 1fr}

.field{margin-bottom:12px;position:relative}
.input-wrap{position:relative}
.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-dim);pointer-events:none;
}
.input{
  width:100%;background:var(--card-2);
  border:1px solid var(--border-strong);color:#fff;
  font-size:14.5px;padding:14px 14px 14px 40px;border-radius:12px;
  outline:none;transition:border-color .18s, box-shadow .18s;
}
.input.no-icon{padding-left:14px}
.input::placeholder{color:var(--text-dim)}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}

.pw-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:transparent;border:none;color:var(--text-dim);cursor:pointer;
  padding:6px;border-radius:8px;display:flex;align-items:center;
}
.pw-toggle:hover{color:#fff;background:rgba(255,255,255,.05)}
.pw-toggle svg{width:16px;height:16px}

.row-between{
  display:flex;align-items:center;justify-content:space-between;
  margin:6px 0 18px;font-size:12.5px;
}
.check{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);cursor:pointer}
.check input{accent-color:var(--brand);width:14px;height:14px}
.forgot{color:var(--brand-light);text-decoration:none;font-weight:700;cursor:pointer}
.forgot:hover{text-decoration:underline}

.btn{
  width:100%;padding:15px;border:none;border-radius:12px;cursor:pointer;
  font-size:15px;font-weight:800;letter-spacing:.3px;color:#fff;
  background:var(--grad-brand-135);box-shadow:var(--shadow-brand);
  transition:transform .12s, box-shadow .18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-brand-strong)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.65;cursor:not-allowed}
.btn .spin{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;
}
.btn.loading .spin{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.msg{
  font-size:12.5px;padding:11px 12px;border-radius:10px;
  margin-bottom:14px;display:none;line-height:1.4;
}
.msg.err{display:block;background:rgba(220,38,38,.10);border:1px solid rgba(220,38,38,.35);color:#fca5a5}
.msg.ok{display:block;background:rgba(22,163,74,.10);border:1px solid rgba(22,163,74,.35);color:#86efac}

.copy{text-align:center;color:#4b5563;font-size:11px;margin-top:22px;letter-spacing:.4px}
</style>
</head>
<body>

<div class="card">
  <!-- Hero -->
  <aside class="hero">
    <div class="hero-banner" id="hero-banner"></div>

    <div class="hero-top">
      <div class="hero-brand">
        <div class="hero-logo"><img data-dk-logo src="img/logo-blue.jpg" alt="Draksyon" /></div>
        <div class="hero-name">DRAKSYON</div>
      </div>
      <a href="index.html" class="hero-back">
        Voltar ao site
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <div class="hero-copy">
      <span class="hero-tag" id="hero-tag">Em destaque</span>
      <div class="hero-title" id="hero-title">Sua próxima<br/>obsessão começa aqui.</div>
      <div class="hero-dots" id="hero-dots"></div>
    </div>
  </aside>

  <!-- Painel -->
  <main class="panel">
    <h2 class="panel-title" id="title">Bem-vindo de volta</h2>
    <p class="panel-sub" id="subtitle">Já tem conta? <a data-mode="login">Entrar</a></p>

    <div class="tabs" role="tablist">
      <div class="tab active" data-mode="login">Entrar</div>
      <div class="tab" data-mode="signup">Criar conta</div>
    </div>

    <div class="msg" id="msg"></div>

    <form id="form" autocomplete="on">
      <div class="name-row" id="name-row">
        <div class="field">
          <div class="input-wrap">
            <input type="text" class="input no-icon" id="firstname" autocomplete="given-name" placeholder="Nome" />
          </div>
        </div>
        <div class="field">
          <div class="input-wrap">
            <input type="text" class="input no-icon" id="lastname" autocomplete="family-name" placeholder="Sobrenome" />
          </div>
        </div>
      </div>

      <div class="field">
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" class="input" id="email" required autocomplete="email" placeholder="E-mail" />
        </div>
      </div>

      <div class="field">
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" class="input" id="password" required minlength="6" autocomplete="current-password" placeholder="Sua senha" />
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Mostrar senha">
            <svg id="pw-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="row-between">
        <label class="check"><input type="checkbox" id="remember" checked /> Lembrar de mim</label>
        <a class="forgot" id="forgot">Esqueci a senha</a>
      </div>

      <button class="btn" id="submit" type="submit">
        <span class="spin"></span>
        <span class="lbl">Entrar</span>
      </button>
    </form>

    <p class="copy">© Draksyon • Sua central de animes</p>
  </main>
</div>

<script>
(function(){
  var mode = 'login';
  var msg = document.getElementById('msg');
  var pw  = document.getElementById('password');
  var btn = document.getElementById('submit');
  var lbl = btn.querySelector('.lbl');
  var em  = document.getElementById('email');
  var nameRow = document.getElementById('name-row');

  /* ===== Carrossel de banners de animes ===== */
  (function initBanner(){
    var banners = [
      { img:'https://images4.alphacoders.com/135/1350069.jpeg',        tag:'Ação',      title:'Sua próxima<br/>obsessão começa aqui.' },
      { img:'https://images.alphacoders.com/128/1289606.jpg',          tag:'Aventura',  title:'Mundos infinitos.<br/>Uma única jornada.' },
      { img:'https://images7.alphacoders.com/131/1315913.jpeg',        tag:'Fantasia',  title:'Do lançamento<br/>ao clássico.' },
      { img:'https://images6.alphacoders.com/125/1256388.jpeg',        tag:'Shonen',    title:'Assista onde<br/>e quando quiser.' }
    ];
    var wrap  = document.getElementById('hero-banner');
    var tagEl = document.getElementById('hero-tag');
    var titEl = document.getElementById('hero-title');
    var dots  = document.getElementById('hero-dots');
    if (!wrap || !titEl) return;
    banners.forEach(function(b,i){
      var s = document.createElement('div');
      s.className = 'hero-banner-slide' + (i===0?' on':'');
      s.style.backgroundImage = 'url("' + b.img + '")';
      wrap.appendChild(s);
      var d = document.createElement('span');
      if (i===0) d.className = 'on';
      d.addEventListener('click', function(){ show(i); });
      dots.appendChild(d);
    });
    var idx = 0;
    function show(i){
      idx = (i + banners.length) % banners.length;
      var slides = wrap.querySelectorAll('.hero-banner-slide');
      var ds = dots.querySelectorAll('span');
      slides.forEach(function(s,j){ s.classList.toggle('on', j===idx); });
      ds.forEach(function(s,j){ s.classList.toggle('on', j===idx); });
      tagEl.textContent = banners[idx].tag;
      titEl.innerHTML   = banners[idx].title;
    }
    show(0);
    setInterval(function(){ show(idx+1); }, 5000);
  })();


  document.getElementById('pw-toggle').addEventListener('click', function(){
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  function setMode(m){
    mode = m;
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.mode === m); });
    document.getElementById('title').textContent    = m === 'signup' ? 'Criar sua conta' : 'Bem-vindo de volta';
    document.getElementById('subtitle').innerHTML   = m === 'signup'
      ? 'Já tem conta? <a data-mode="login">Entrar</a>'
      : 'Novo por aqui? <a data-mode="signup">Criar conta</a>';
    lbl.textContent = m === 'signup' ? 'Criar conta' : 'Entrar';
    pw.setAttribute('autocomplete', m === 'signup' ? 'new-password' : 'current-password');
    pw.setAttribute('placeholder', m === 'signup' ? 'Escolha uma senha (mín. 6)' : 'Sua senha');
    nameRow.classList.toggle('show', m === 'signup');
    msg.className = 'msg';
    bindModeLinks();
  }
  function bindModeLinks(){
    document.querySelectorAll('[data-mode]').forEach(function(el){
      el.onclick = function(){ setMode(el.dataset.mode); };
    });
  }
  bindModeLinks();

  function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }
  function friendly(code){
    var map = {
      'auth/invalid-email':'E-mail inválido.',
      'auth/user-not-found':'Nenhuma conta encontrada com este e-mail.',
      'auth/wrong-password':'Senha incorreta.',
      'auth/invalid-credential':'E-mail ou senha incorretos.',
      'auth/email-already-in-use':'Este e-mail já está cadastrado. Tente entrar.',
      'auth/weak-password':'Senha muito fraca (mínimo 6 caracteres).',
      'auth/network-request-failed':'Falha de rede. Verifique sua conexão.',
      'auth/too-many-requests':'Muitas tentativas. Aguarde alguns instantes.',
      'auth/operation-not-allowed':'E-mail/Senha não está habilitado no Firebase.',
      'auth/missing-password':'Digite sua senha.'
    };
    return map[code] || 'Erro ao autenticar. Tente novamente.';
  }

  function ensureInit(){
    if (!window.firebase || !firebase.auth) return false;
    if (!window.__DK_FB_INIT__) {
      try { firebase.initializeApp(window.DK_FIREBASE_CONFIG); window.__DK_FB_INIT__ = true; }
      catch(e){ window.__DK_FB_INIT__ = true; }
    }
    return true;
  }

  function checkExisting(){
    if (!ensureInit()) { setTimeout(checkExisting, 200); return; }
    firebase.auth().onAuthStateChanged(function(user){
      if (user) location.replace('perfis.html');
    });
  }
  checkExisting();

  document.getElementById('forgot').addEventListener('click', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase carregando… tente novamente em 1s.'); return; }
    var email = em.value.trim();
    if (!email) { show('err','Digite seu e-mail acima para receber o link de recuperação.'); em.focus(); return; }
    try {
      await firebase.auth().sendPasswordResetEmail(email);
      show('ok','Enviamos um link de recuperação para ' + email + '.');
    } catch(err){ show('err', friendly(err && err.code)); }
  });

  document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    if (!ensureInit()) { show('err','Firebase não carregou. Recarregue a página.'); return; }
    var email = em.value.trim();
    var pass  = pw.value;
    btn.disabled = true; btn.classList.add('loading'); msg.className = 'msg';
    try {
      var persistence = document.getElementById('remember').checked
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;
      try { await firebase.auth().setPersistence(persistence); } catch(_){}

      if (mode === 'signup') {
        var cred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
        var fn = (document.getElementById('firstname').value || '').trim();
        var ln = (document.getElementById('lastname').value || '').trim();
        var full = (fn + ' ' + ln).trim();
        if (full && cred && cred.user && cred.user.updateProfile) {
          try { await cred.user.updateProfile({ displayName: full }); } catch(_){}
        }
      } else {
        await firebase.auth().signInWithEmailAndPassword(email, pass);
      }
      show('ok','Sucesso! Redirecionando…');
      setTimeout(function(){ location.replace('perfis.html'); }, 400);
    } catch(err){
      show('err', friendly(err && err.code));
      btn.disabled = false; btn.classList.remove('loading');
    }
  });
})();
</script>
</body>
</html>
